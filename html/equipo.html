<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autos Locos - Nuestro Equipo</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <style>
        .carrousel-empleados {
            position: relative;
            width: 80%;
            margin: 40px auto;
        }

        .carrousel-inner {
            position: relative;
            width: 100%;
            height: 300px;
            overflow: hidden;
        }

        .carrousel-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .carrousel-item.active {
            opacity: 1;
        }

        .carrousel-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .carrousel-item .nombre-empleado {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.5);
            padding: 10px;
        }

        .carrousel-controls {
            position: absolute;
            bottom: -50px;
            left: 0;
            width: 100%;
            text-align: center;
        }

        .prev,
        .next {
            background-color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .prev:hover,
        .next:hover {
            background-color: #ccc;
        }

        footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 10px;
        }

        .carrousel-item img {
            object-fit: cover;
        }

        li:hover {
            background-color: #333;
            text-decoration: underline;
        }
        .cargo-empleado {
    font-size: 16px;
    color: #666;
    margin-top: 10px;
}
    </style>
</head>

<body>
    <header class="bg-danger text-white text-center p-4">
        <h1>Autos Locos</h1>
        <nav>
            <ul class="nav justify-content-center">
                <li class="nav-item"><a class="nav-link text-white" href="home.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="about.html">Sobre Nosotros</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="ubicacion.html">Ubicación</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="equipo.html">Equipo</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="concesionario.html">Catálogo</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="contacto.html">Atención al cliente</a></li>
            </ul>
        </nav>
    </header>

    <main class="container mt-4">
        <div class="carrousel-empleados">
            <div class="carrousel-inner">
                <div class="carrousel-item active">
                    <img src="../resources/churuuu.jpeg" alt="Empleado 1">
                    <h3 class="nombre-empleado">Juan Pérez</h3>
                    <p class="cargo-empleado">Gerente General</p>
                </div>
                <div class="carrousel-item">
                    <img src="../resources/maeb.jpeg" alt="Empleado 2">
                    <h3 class="nombre-empleado">María Rodríguez</h3>
                    <p class="cargo-empleado">Jefa de Ventas</p>
                </div>
                <div class="carrousel-item">
                    <img src="../resources/dandy.jpg" alt="Empleado 3">
                    <h3 class="nombre-empleado">Carlos "Dandy" Chacón </h3>
                    <p class="cargo-empleado">Mećanico</p>
                </div>
            </div>
            <div class="carrousel-controls">
                <button class="prev">Anterior</button>
                <button class="next">Siguiente</button>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center p-3 mt-4">
        <p>&copy; 2025 Autos Locos. Todos los derechos reservados.</p>
    </footer>

    <script>
        // Selecciona el carrousel y sus elementos
        const carrousel = document.querySelector('.carrousel-empleados');
        const carrouselInner = carrousel.querySelector('.carrousel-inner');
        const carrouselItems = carrouselInner.querySelectorAll('.carrousel-item');
        const prevButton = carrousel.querySelector('.prev');
        const nextButton = carrousel.querySelector('.next');
        const nombreEmpleadoActivo = carrousel.querySelector('#nombre-empleado-activo');

        // Agregamos un evento de clic a los botones de control
        prevButton.addEventListener('click', () => {
            // Obtenemos el índice del elemento activo
            const activeIndex = Array.prototype.indexOf.call(carrouselItems, carrousel.querySelector('.active'));

            // Cambiamos el elemento activo al anterior
            carrouselItems[activeIndex - 1].classList.add('active');
            carrouselItems[activeIndex].classList.remove('active');

            // Actualizamos el nombre del empleado
            const nombreEmpleado = carrouselItems[activeIndex - 1].querySelector('.nombre-empleado').textContent;
            nombreEmpleadoActivo.textContent = nombreEmpleado;
        });

        nextButton.addEventListener('click', () => {
            // Obtenemos el índice del elemento activo
            const activeIndex = Array.prototype.indexOf.call(carrouselItems, carrousel.querySelector('.active'));

            // Cambiamos el elemento activo al siguiente
            carrouselItems[activeIndex + 1].classList.add('active');
            carrouselItems[activeIndex].classList.remove('active');

            // Actualizamos el nombre del empleado
            const nombreEmpleado = carrouselItems[activeIndex + 1].querySelector('.nombre-empleado').textContent;
            nombreEmpleadoActivo.textContent = nombreEmpleado;
        });
    </script>

</body>

</html>
